name = "gachi-chukanavi"
main = ".open-next/worker.js"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "gachi-chukanavi"

# 本地开发 D1 数据库
[[d1_databases]]
binding = "DB"
database_name = "gachi-chukanavi-db"
database_id = "3478d84b-39dc-4602-b5c5-02efc64a02e1"

# KV Namespace（AI摘要缓存）
[[kv_namespaces]]
binding = "CACHE"
id = "6e3851f03b814594a0595ed3ae847a95"

# 本地开发变量（敏感 key 用 wrangler secret 管理）
[vars]
APP_NAME_ZH = "真味中华"
APP_NAME_JA = "ガチ中華ナビ"
DEFAULT_CITY = "tokyo"
